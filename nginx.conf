# Nginx config para Cloudy
# Copiá este archivo a /etc/nginx/sites-available/cloudy
# y hacé: sudo ln -s /etc/nginx/sites-available/cloudy /etc/nginx/sites-enabled/
# Luego: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name cloudy.orion;    # cambiá por tu dominio o IP

    # Tamaño máximo de upload (debe coincidir con el límite en Node)
    client_max_body_size 25M;

    # Proxy /api/* → Node.js backend en puerto 3001
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;

        # Timeout largo para uploads grandes
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Todo lo demás → archivos estáticos del frontend
    location / {
        root   /opt/cloudy/public;    # ajustá al path real del proyecto
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
}
