<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloudy</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f6fb;
  --surface: #ffffff;
  --surface2: #f5f9fd;
  --accent: #3a8fc4;
  --accent-light: #e0f0f9;
  --text: #1a2633;
  --text-muted: #6b8299;
  --border: rgba(58,143,196,0.15);
  --border-strong: rgba(58,143,196,0.3);
  --shadow: 0 2px 12px rgba(58,100,140,0.08);
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

/* Layout */
.app { max-width: 780px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

/* Header */
header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 2rem;
}
.logo {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, #a8d8f0, #3a8fc4);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
header h1 span { color: var(--accent); }
.file-count {
  margin-left: auto;
  font-size: 12px; color: var(--text-muted);
  background: var(--surface); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px;
}

/* Search */
.search-wrap { margin-bottom: 1.25rem; }
.search-box {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1.5px solid var(--border-strong);
  border-radius: var(--radius); padding: 12px 16px;
  box-shadow: var(--shadow);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(58,143,196,0.12);
}
.search-box input {
  flex: 1; border: none; outline: none; background: transparent;
  font-family: 'Sora', sans-serif; font-size: 14px; color: var(--text);
}
.search-box input::placeholder { color: var(--text-muted); }
.search-icon { color: var(--text-muted); font-size: 15px; flex-shrink: 0; }
.ask-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-sm); padding: 7px 14px;
  font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  transition: background 0.2s, transform 0.1s;
}
.ask-btn:hover { background: #2e7aad; }
.ask-btn:active { transform: scale(0.97); }
.ask-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

/* AI bubble */
.ai-bubble {
  background: var(--surface); border: 1px solid var(--border-strong);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 1.25rem; display: none;
  animation: fade-in 0.2s ease;
}
.ai-bubble.visible { display: block; }
.ai-label {
  font-size: 11px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px;
}
.ai-answer { font-size: 14px; line-height: 1.65; color: var(--text); }
.ai-sources { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
.ai-src {
  font-size: 11px; padding: 3px 9px; border-radius: 20px;
  background: var(--accent-light); color: var(--accent);
  border: 1px solid rgba(58,143,196,0.25); font-weight: 500;
}

/* Stats */
.stats { display: flex; gap: 10px; margin-bottom: 1.5rem; }
.stat {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; text-align: center;
  box-shadow: var(--shadow);
}
.stat-n { font-size: 22px; font-weight: 600; }
.stat-l { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* Upload zone */
.upload-zone {
  background: var(--surface); border: 2px dashed var(--border-strong);
  border-radius: var(--radius); padding: 28px 20px;
  text-align: center; cursor: pointer; margin-bottom: 1.5rem;
  transition: all 0.2s; position: relative;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-light);
}
.upload-zone input { display: none; }
.upload-icon { font-size: 28px; margin-bottom: 10px; }
.upload-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.upload-sub { font-size: 12px; color: var(--text-muted); }

/* Progress */
.upload-progress {
  margin-bottom: 1rem; display: none;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
}
.upload-progress.visible { display: block; }
.prog-bar-wrap { background: var(--bg); border-radius: 20px; height: 6px; margin-top: 8px; }
.prog-bar { height: 6px; border-radius: 20px; background: var(--accent); width: 0%; transition: width 0.3s; }

/* Section label */
.section-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 10px;
}

/* File list */
.file-list { display: flex; flex-direction: column; gap: 8px; }
.file-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  box-shadow: var(--shadow);
  transition: border-color 0.15s, transform 0.1s;
  animation: fade-in 0.2s ease;
}
.file-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.file-card.highlighted { border-color: var(--accent); background: var(--accent-light); }

@keyframes fade-in {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.file-ico {
  width: 38px; height: 38px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.file-ico.xlsx { background: #e8f5e0; }
.file-ico.csv  { background: #e0f5ee; }
.file-ico.txt, .file-ico.md { background: #fff3e0; }
.file-ico.pdf  { background: #fce8e8; }
.file-ico.docx, .file-ico.doc { background: #e8eef8; }
.file-ico.other { background: var(--bg); }

.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.file-actions { display: flex; align-items: center; gap: 6px; }
.tag {
  font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500;
}
.tag.xlsx { background: #e8f5e0; color: #3b6d11; }
.tag.csv  { background: #e0f5ee; color: #0f6e56; }
.tag.txt, .tag.md { background: #fff3e0; color: #854f0b; }
.tag.pdf  { background: #fce8e8; color: #a32d2d; }
.tag.docx, .tag.doc { background: #e8eef8; color: #185fa5; }
.tag.other { background: var(--bg); color: var(--text-muted); }

.icon-btn {
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; cursor: pointer; border: 1px solid var(--border);
  background: var(--bg); color: var(--text-muted); opacity: 0;
  transition: opacity 0.15s, background 0.15s;
}
.file-card:hover .icon-btn { opacity: 1; }
.icon-btn:hover { background: var(--surface); color: var(--text); }
.icon-btn.del:hover { background: #fce8e8; color: #a32d2d; border-color: #f09595; }

/* Empty state */
.empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 13px; }

/* Toast */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--text); color: #fff;
  padding: 10px 16px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  transform: translateY(60px); opacity: 0;
  transition: all 0.25s; pointer-events: none; z-index: 999;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { background: #a32d2d; }

/* Loading dots */
.dots span {
  display: inline-block; width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); margin: 0 2px;
  animation: pulse 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse {
  0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
  40%          { transform: scale(1);   opacity: 1;   }
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">☁️</div>
    <h1>cloud<span>y</span></h1>
    <span class="file-count" id="file-count">cargando...</span>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Buscá en tus archivos… ej: presupuesto Q3, reunión viernes" />
      <button class="ask-btn" id="ask-btn">Preguntar</button>
    </div>
  </div>

  <!-- AI answer -->
  <div class="ai-bubble" id="ai-bubble">
    <div class="ai-label">✦ Respuesta IA</div>
    <div class="ai-answer" id="ai-answer"></div>
    <div class="ai-sources" id="ai-sources"></div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-n" id="s-xlsx">0</div><div class="stat-l">Excels</div></div>
    <div class="stat"><div class="stat-n" id="s-docs">0</div><div class="stat-l">Notas / Docs</div></div>
    <div class="stat"><div class="stat-n" id="s-other">0</div><div class="stat-l">Otros</div></div>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" multiple accept=".xlsx,.xls,.csv,.txt,.md,.pdf,.docx,.doc" />
    <div class="upload-icon">☁️</div>
    <div class="upload-title">Arrastrá archivos o hacé click para subir</div>
    <div class="upload-sub">Excel · CSV · TXT · Markdown · PDF · Word — máx. 20 MB por archivo</div>
  </div>

  <div class="upload-progress" id="upload-progress">
    <span style="font-size:13px;font-weight:500">Subiendo...</span>
    <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  </div>

  <!-- File list -->
  <div class="section-label" id="files-label" style="display:none">Tus archivos</div>
  <div class="file-list" id="file-list"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = '';  // same origin — nginx proxies /api to Node

let allFiles = [];
let highlightedFiles = new Set();

// Helpers
function ext(name) { return (name.match(/\.(\w+)$/) || ['','other'])[1].toLowerCase(); }
function cat(e) {
  if (['xlsx','xls'].includes(e)) return 'xlsx';
  if (e === 'csv') return 'csv';
  if (['txt','md'].includes(e)) return 'txt';
  if (e === 'pdf') return 'pdf';
  if (['docx','doc'].includes(e)) return 'docx';
  return 'other';
}
function icon(e) {
  const m = {xlsx:'📊',xls:'📊',csv:'📋',txt:'📝',md:'📝',pdf:'📄',docx:'📃',doc:'📃'};
  return m[e] || '📁';
}
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return Math.round(b/1024) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function fmtDate(d) {
  return new Date(d).toLocaleDateString('es-AR', {day:'2-digit',month:'short',year:'numeric'});
}
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' error':'');
  setTimeout(() => t.className = 'toast', 2800);
}

// Load file list from server
async function loadFiles() {
  try {
    const r = await fetch(API + '/api/files');
    allFiles = await r.json();
    renderFiles();
    updateStats();
  } catch { toast('No se pudo conectar al servidor', true); }
}

function updateStats() {
  const n = allFiles.length;
  document.getElementById('file-count').textContent = n + (n===1?' archivo':' archivos');
  document.getElementById('stats').style.display = n ? 'flex' : 'none';
  document.getElementById('files-label').style.display = n ? 'block' : 'none';
  document.getElementById('s-xlsx').textContent = allFiles.filter(f=>['xlsx','xls','csv'].includes(ext(f.name))).length;
  document.getElementById('s-docs').textContent = allFiles.filter(f=>['txt','md','docx','doc'].includes(ext(f.name))).length;
  document.getElementById('s-other').textContent = allFiles.filter(f=>!['xlsx','xls','csv','txt','md','docx','doc'].includes(ext(f.name))).length;
}

function renderFiles() {
  const list = document.getElementById('file-list');
  if (allFiles.length === 0) {
    list.innerHTML = '<div class="empty">Todavía no hay archivos. ¡Subí el primero!</div>';
    return;
  }
  list.innerHTML = '';
  allFiles.forEach(f => {
    const e = ext(f.name);
    const c = cat(e);
    const hl = highlightedFiles.size && highlightedFiles.has(f.name);
    const card = document.createElement('div');
    card.className = 'file-card' + (hl ? ' highlighted' : '');
    card.innerHTML = `
      <div class="file-ico ${c}">${icon(e)}</div>
      <div class="file-info">
        <div class="file-name">${f.name}</div>
        <div class="file-meta">${fmtSize(f.size)} · ${fmtDate(f.modified)}</div>
      </div>
      <div class="file-actions">
        <span class="tag ${c}">${e.toUpperCase()}</span>
        <a href="/api/files/${encodeURIComponent(f.name)}/download" title="Descargar" class="icon-btn">⬇</a>
        <button class="icon-btn del" data-name="${f.name}" title="Eliminar">✕</button>
      </div>`;
    list.appendChild(card);
  });
  list.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', () => deleteFile(btn.dataset.name));
  });
}

// Upload
async function uploadFiles(fileList) {
  if (!fileList.length) return;
  const prog = document.getElementById('upload-progress');
  const bar = document.getElementById('prog-bar');
  prog.className = 'upload-progress visible';
  bar.style.width = '20%';

  const fd = new FormData();
  Array.from(fileList).forEach(f => fd.append('files', f));

  try {
    bar.style.width = '60%';
    const r = await fetch(API + '/api/upload', { method: 'POST', body: fd });
    bar.style.width = '100%';
    const data = await r.json();
    if (data.error) { toast(data.error, true); }
    else { toast(`${data.length} archivo${data.length>1?'s':''} subido${data.length>1?'s':''}!`); }
    await loadFiles();
  } catch { toast('Error al subir archivos', true); }
  finally { setTimeout(() => { prog.className = 'upload-progress'; bar.style.width = '0%'; }, 700); }
}

async function deleteFile(name) {
  if (!confirm(`¿Eliminar "${name}"?`)) return;
  try {
    await fetch(API + '/api/files/' + encodeURIComponent(name), { method: 'DELETE' });
    toast(`"${name}" eliminado`);
    await loadFiles();
  } catch { toast('Error al eliminar', true); }
}

// Search / AI
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const bubble = document.getElementById('ai-bubble');
  const answerEl = document.getElementById('ai-answer');
  const sourcesEl = document.getElementById('ai-sources');
  bubble.className = 'ai-bubble visible';
  answerEl.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  sourcesEl.innerHTML = '';
  document.getElementById('ask-btn').disabled = true;

  try {
    const r = await fetch(API + '/api/search', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ query: q })
    });
    const data = await r.json();
    if (data.error) { answerEl.textContent = 'Error: ' + data.error; return; }

    answerEl.textContent = data.answer;
    sourcesEl.innerHTML = '';
    highlightedFiles = new Set(data.sources || []);
    data.sources?.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'ai-src';
      tag.textContent = '📎 ' + s;
      sourcesEl.appendChild(tag);
    });
    renderFiles();
  } catch (e) {
    answerEl.textContent = 'Error de conexión con el servidor.';
  } finally {
    document.getElementById('ask-btn').disabled = false;
  }
}

// Events
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });
document.getElementById('ask-btn').addEventListener('click', doSearch);

const zone = document.getElementById('upload-zone');
const fi = document.getElementById('file-input');
zone.addEventListener('click', () => fi.click());
fi.addEventListener('change', e => { uploadFiles(e.target.files); fi.value=''; });
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); uploadFiles(e.dataTransfer.files); });

loadFiles();
</script>
</body>
</html>
